<svg xmlns="http://www.w3.org/2000/svg" width="850" height="520" viewBox="0 0 850 520">
    <defs>
        <style>
            /* Cores e Fontes do Windows 11 Terminal */
            .bg { fill: #0c0c0c; }
            .topbar { fill: #1c1c1c; }
            .text { font-family: Consolas, 'Courier New', monospace; font-size: 15px; fill: #cccccc; }
            .prompt { fill: #16c60c; }
            .cmd { fill: #ffffff; font-weight: bold; }
            .highlight { fill: #ffbf2f; }
            .success { fill: #27c93f; }
            .header { fill: #888888; }
            .property { fill: #5ed7ff; }

            /* Animações Core */
            @keyframes blink { 0%, 49% { opacity: 1; } 50%, 100% { opacity: 0; } }
            @keyframes show { to { opacity: 1; } }
            @keyframes hide { to { opacity: 0; } }

            /* Comando 1: Get-DeveloperProfile */
            .cover1 { animation: type1 0.8s steps(20, end) 0.5s forwards; }
            @keyframes type1 { to { width: 0; x: 405px; } }
            
            .cursor1 { animation: blink 0.5s step-end 1, moveC1 0.8s steps(20, end) 0.5s forwards, hide 0.1s 1.3s forwards; }
            @keyframes moveC1 { to { transform: translateX(180px); } }

            .out1-1 { opacity: 0; animation: show 0.1s 1.4s forwards; }
            .out1-2 { opacity: 0; animation: show 0.1s 1.5s forwards; }
            .out1-3 { opacity: 0; animation: show 0.1s 1.6s forwards; }
            .out1-4 { opacity: 0; animation: show 0.1s 1.7s forwards; }

            /* Comando 2: Get-Content skills.txt */
            .step2 { opacity: 0; animation: show 0.1s 2.5s forwards; }
            
            .cover2 { animation: type2 0.8s steps(22, end) 3.0s forwards; }
            @keyframes type2 { to { width: 0; x: 425px; } }
            
            .cursor2 { opacity: 0; animation: show 0.1s 2.5s forwards, blink 0.5s step-end 1 2.5s, moveC2 0.8s steps(22, end) 3.0s forwards, hide 0.1s 3.8s forwards; }
            @keyframes moveC2 { to { transform: translateX(200px); } }

            .out2-1 { opacity: 0; animation: show 0.1s 3.9s forwards; }
            .out2-2 { opacity: 0; animation: show 0.1s 4.0s forwards; }
            .out2-3 { opacity: 0; animation: show 0.1s 4.1s forwards; }
            .out2-4 { opacity: 0; animation: show 0.1s 4.2s forwards; }

            /* Comando 3: fetch_github_data.exe */
            .step3 { opacity: 0; animation: show 0.1s 5.0s forwards; }
            
            .cover3 { animation: type3 0.9s steps(23, end) 5.5s forwards; }
            @keyframes type3 { to { width: 0; x: 435px; } }
            
            .cursor3 { opacity: 0; animation: show 0.1s 5.0s forwards, blink 0.5s step-end 1 5.0s, moveC3 0.9s steps(23, end) 5.5s forwards, hide 0.1s 6.4s forwards; }
            @keyframes moveC3 { to { transform: translateX(210px); } }

            .out3-1 { opacity: 0; animation: show 0.1s 6.6s forwards; }
            .out3-2 { opacity: 0; animation: show 0.1s 7.8s forwards; }

            /* Prompt Final */
            .step4 { opacity: 0; animation: show 0.1s 8.5s forwards; }
            .cursor4 { opacity: 0; animation: show 0.1s 8.5s forwards, blink 1s step-end infinite 8.5s; }
        </style>
    </defs>
    
    <rect width="850" height="520" rx="8" ry="8" fill="#0c0c0c" stroke="#333333" stroke-width="1"/>
    
    <path d="M 1 9 A 8 8 0 0 1 9 1 L 841 1 A 8 8 0 0 1 849 9 L 849 40 L 1 40 Z" fill="#1c1c1c"/>
    
    <path d="M 10 16 A 6 6 0 0 1 16 10 L 224 10 A 6 6 0 0 1 230 16 L 230 40 L 10 40 Z" fill="#0c0c0c"/>
    <text x="22" y="29" font-family="Consolas" font-size="14" fill="#3b78ff">&gt;_</text>
    <text x="45" y="28" font-family="Segoe UI, Helvetica, sans-serif" font-size="12" fill="#cccccc">Windows PowerShell</text>
    
    <path d="M 760 20 L 770 20" stroke="#cccccc" stroke-width="1.2"/>
    <rect x="795" y="15" width="10" height="10" stroke="#cccccc" stroke-width="1.2" fill="none"/>
    <path d="M 830 15 L 840 25 M 840 15 L 830 25" stroke="#cccccc" stroke-width="1.2"/>
    
    <g class="text">
        <text x="20" y="70" class="header">Windows PowerShell</text>
        <text x="20" y="90" class="header">Copyright (C) Microsoft Corporation. All rights reserved.</text>
        
        <text x="20" y="130"><tspan class="prompt">PS C:\Users\Alexispher&gt;</tspan> <tspan class="cmd">Get-DeveloperProfile</tspan></text>
        <rect x="225" y="115" width="180" height="20" fill="#0c0c0c" class="cover1" />
        <text x="225" y="130" class="cursor1">█</text>

        <text x="20" y="160" class="out1-1"><tspan class="property">AccountName</tspan>    : desktop-dev\alexispher</text>
        <text x="20" y="180" class="out1-2"><tspan class="property">OSVersion</tspan>      : Windows 11 Pro</text>
        <text x="20" y="200" class="out1-3"><tspan class="property">Environment</tspan>    : PowerShell 7.4.2</text>
        <text x="20" y="220" class="out1-4"><tspan class="property">Role</tspan>           : Software Developer</text>

        <g class="step2">
            <text x="20" y="260"><tspan class="prompt">PS C:\Users\Alexispher&gt;</tspan> <tspan class="cmd">Get-Content skills.txt</tspan></text>
            <rect x="225" y="245" width="200" height="20" fill="#0c0c0c" class="cover2" />
        </g>
        <text x="225" y="260" class="cursor2">█</text>

        <text x="20" y="290" class="out2-1 highlight">[MAIN SKILLS]</text>
        <text x="20" y="310" class="out2-2">&gt; Python, JavaScript</text>
        <text x="20" y="340" class="out2-3 highlight">[CURRENTLY STUDYING]</text>
        <text x="20" y="360" class="out2-4">&gt; Java, Rust, SQL</text>

        <g class="step3">
            <text x="20" y="400"><tspan class="prompt">PS C:\Users\Alexispher&gt;</tspan> <tspan class="cmd">.\fetch_github_data.exe</tspan></text>
            <rect x="225" y="385" width="210" height="20" fill="#0c0c0c" class="cover3" />
        </g>
        <text x="225" y="400" class="cursor3">█</text>

        <text x="20" y="430" class="out3-1">Initialising connection to api.github.com...</text>
        <text x="20" y="455" class="out3-2 success">Success! Rendering 3D contribution matrix below.</text>

        <text x="20" y="495" class="step4"><tspan class="prompt">PS C:\Users\Alexispher&gt;</tspan></text>
        <text x="225" y="495" class="cursor4">█</text>
    </g>
</svg>
