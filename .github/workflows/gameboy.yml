name: Generate Gameboy Contributions

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Run Python Script
        run: python build_gameboy.py
        
      - name: Commit and Push Image
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "update: Gameboy contributions"
          file_pattern: "gameboy_contrib.svg"
