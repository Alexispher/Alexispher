name: Generate Gameboy Contributions
on:
  schedule:
    - cron: "0 0 * * *" # Atualiza todo dia
  workflow_dispatch: # Permite rodar clicando no botão

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'
          
      - name: Run Python Script
        run: python build_gameboy.py
        
      - name: Commit and Push
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add gameboy_contrib.svg
          git commit -m "update: Gameboy contributions" || exit 0
          git push
